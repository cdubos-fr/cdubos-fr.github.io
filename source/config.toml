base_url = "https://cdubos.fr/"
title = "Clément Dubos"
description = "Développeur, Architecte web et logiciel, basé dans l'Aude. J'étudie vos problématiques afin de vous offrir la meilleur solutions sur mesure, en fonction de vos moyens."
author = "Clément Dubos"

# Configuration du thème et de la langue
default_language = "fr"
generate_feeds = false
compile_sass = true
minify_html = true
build_search_index = true

# Configuration Markdown
[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[markdown.highlighting]
light_theme = "github-light"
dark_theme = "github-dark"

# Configuration des liens
[link_checker]
internal_level = "error"
external_level = "warn"
